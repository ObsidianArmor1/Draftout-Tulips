<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 26.1.1: Tulip Fields Coordinate Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Panel -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <h1>TULIP MAP</h1>
                </div>
                <p class="subtitle">Plains biome flower finder</p>
            </header>

            <!-- Player Coordinate Tracker -->
            <section class="panel-section">
                <h2>📍 Player Tracking</h2>
                <div class="input-group">
                    <div class="field">
                        <label for="player-x">Player X</label>
                        <input type="number" id="player-x" placeholder="e.g. 100">
                    </div>
                    <div class="field">
                        <label for="player-z">Player Z</label>
                        <input type="number" id="player-z" placeholder="e.g. -200">
                    </div>
                </div>
                <button id="track-btn" class="primary-btn">Track Coordinates</button>
                <div class="tip-box">
                    <strong>Tip:</strong> Press <code>F3 + C</code> in Minecraft to copy your coordinates, then press <code>Ctrl + V</code> (or <code>Cmd + V</code>) anywhere on this page to instantly track!
                </div>
            </section>
        </aside>

        <!-- Main Map Area -->
        <main class="map-area">
            <!-- Map Canvas Container -->
            <div class="canvas-container" id="canvas-container">
                <canvas id="map-canvas"></canvas>
                
                <!-- On-canvas UI -->
                <div class="map-controls">
                    <button id="zoom-in" title="Zoom In">+</button>
                    <button id="zoom-out" title="Zoom Out">−</button>
                    <button id="reset-view" title="Reset View">☉</button>
                </div>

                <div class="hud">
                    <div class="hud-item">
                        <span class="hud-label">Cursor Coordinate</span>
                        <span class="hud-val" id="hud-coords">X: 0, Z: 0</span>
                    </div>
                    <div class="hud-item" id="hud-tracking-container">
                        <span class="hud-label" id="hud-tracking-label">Tracking</span>
                        <span class="hud-val" id="hud-tracking-val">None</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Load the pre-generated coordinate database first -->
    <script src="fields_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
